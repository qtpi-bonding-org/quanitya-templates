name: Validate Templates

on:
  pull_request:
    paths:
      - 'templates/**'
      - 'catalog.json'
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'catalog.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate templates
        run: ./validate.sh
